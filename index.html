    <style>
        /* ==================== 1. تنسيقات الحاسبة الأساسية ==================== */
        .tansik-dynamic-banner {
            background: linear-gradient(135deg, var(--banner-primary), var(--banner-secondary));
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin: 0 auto 20px auto;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 350px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
        }

        .tansik-new-feature {
            animation: tansik-float 3s ease-in-out infinite;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, rgba(0,119,182,0.1), rgba(0,119,182,0.2));
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .tansik-new-feature:hover {
            transform: scale(1.02) !important;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .tansik-new-feature::before {
            content: "جديد";
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            padding: 3px 12px;
            font-size: 13px;
            border-radius: 20px;
            font-weight: bold;
            animation: tansik-bounce 1.2s ease infinite;
            z-index: 1;
            box-shadow: 0 2px 10px rgba(255,71,87,0.4);
        }

        .tansik-dynamic-content {
            position: relative;
            z-index: 2;
        }

        .tansik-beta-badge {
            background: linear-gradient(135deg, #ff6b81, #ff8e9e);
            color: white;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 13px;
            margin: 0 8px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(255,107,129,0.3);
        }

        .tansik-arrow-icon {
            margin-right: 10px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .tansik-banner-text {
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .tansik-dynamic-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #E1306C, #C13584);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 12px rgba(225,48,108,0.3);
            transition: all 0.3s ease;
        }

        .tansik-dynamic-icon:hover {
            transform: translateY(-50%) scale(1.1);
        }

        .tansik-dynamic-message {
            position: relative;
            padding: 10px 40px 10px 60px;
            text-align: center;
        }

        @keyframes tansik-float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }

        @keyframes tansik-bounce {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-5px) rotate(-10deg); }
        }

        .tansik-boys-mode {
            --primary-color: #0077b6;
            --secondary-color: #90e0ef;
            --background-color: #f0f4f8;
            --input-bg-color: #ffffff;
            --border-color: #ced4da;
            --highlight-color: #0077b6;
            --success-color: #0077b6;
            --exact-match-color: #9b59b6;
            --button-color: #0077b6;
            --boy-button-color: #0077b6;
            --girl-button-color: #ff69b4;
            --search-color: #f8f9fa;
            --boy-college-color: #0077b6;
            --girl-college-color: #ff69b4;
            --college-color: #0077b6;
            --college-item-bg: rgba(0, 119, 182, 0.1);
            --result-bg: #f1f1f1;
            --colleges-list-bg: #ffffff;
            --banner-primary: #0077b6;
            --banner-secondary: #004a7c;
            --instagram-color: #E1306C;
        }

        .tansik-girls-mode {
            --primary-color: #ff69b4;
            --secondary-color: #ffb6c1;
            --background-color: #fff5f9;
            --input-bg-color: #fff0f5;
            --border-color: #ffc0cb;
            --highlight-color: #ff69b4;
            --success-color: #ff69b4;
            --exact-match-color: #9b59b6;
            --button-color: #ff69b4;
            --boy-button-color: #0077b6;
            --girl-button-color: #ff69b4;
            --search-color: #fff0f5;
            --boy-college-color: #0077b6;
            --girl-college-color: #ff69b4;
            --college-color: #ff69b4;
            --college-item-bg: rgba(255, 105, 180, 0.1);
            --result-bg: #ffe6f0;
            --colleges-list-bg: #fff0f5;
            --banner-primary: #ff69b4;
            --banner-secondary: #d44d8c;
            --instagram-color: #C13584;
        }

        .tansik-not-available {
            background-color: #f5f5f5;
            color: #777;
            border-left: 4px solid #999;
            opacity: 0.9;
        }

        .tansik-not-available-message {
            color: #a94442;
            font-size: 14px;
            margin-right: 10px;
            font-style: italic;
        }

        body.tansik-page {
            transition: all 0.5s ease;
            background-color: var(--background-color);
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .tansik-page h1, 
        .tansik-page h2, 
        .tansik-page h3 {
            color: var(--primary-color);
        }

        .tansik-page a {
            color: var(--primary-color);
        }

        .tansik-calculator-container {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0 auto;
            padding: 20px;
            transition: background-color 0.3s ease;
            min-height: 100vh;
            max-width: 1200px;
        }

        .tansik-form-wrapper {
            max-width: 800px;
            margin: auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: all 0.5s ease;
        }

        .tansik-calculator-container h2 {
            color: var(--primary-color);
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .tansik-toggle-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tansik-toggle-buttons button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            transform: scale(1);
        }

        .tansik-toggle-buttons .boys-btn {
            background-color: var(--boy-button-color);
            box-shadow: 0 4px 8px rgba(0, 119, 182, 0.2);
        }

        .tansik-toggle-buttons .girls-btn {
            background-color: var(--girl-button-color);
            box-shadow: 0 4px 8px rgba(255, 105, 180, 0.2);
        }

        .tansik-toggle-buttons button.active {
            outline: 3px solid gold;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .tansik-toggle-buttons button:not(.active):hover {
            transform: scale(1.03);
        }

        .tansik-label {
            display: block;
            text-align: right;
            font-weight: bold;
            margin: 15px 0 5px;
            color: var(--primary-color);
            transition: all 0.3s ease;
        }

        .tansik-input[type="number"],
        .tansik-input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid var(--border-color);
            box-sizing: border-box;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            background-color: var(--input-bg-color);
        }

        .tansik-input[readonly] {
            background-color: var(--result-bg);
            color: var(--primary-color);
        }

        .tansik-input[type="number"]:focus,
        .tansik-input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 119, 182, 0.2);
        }

        .tansik-result-percentage {
            font-size: 18px;
            font-weight: bold;
            color: var(--highlight-color);
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .tansik-error-message {
            color: red;
            font-size: 15px;
            margin-top: 10px;
            display: none;
            animation: tansik-shake 0.5s;
        }

        .tansik-search-container {
            margin: 20px 0;
        }

        .tansik-college-search {
            background-color: var(--search-color);
            padding: 12px 20px;
            font-size: 16px;
        }

        .tansik-colleges-list {
            margin-top: 15px;
            text-align: right;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            transition: all 0.5s ease;
            background-color: var(--colleges-list-bg);
        }

        .tansik-college-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            transition: all 0.3s ease;
            animation: tansik-fadeIn 0.5s ease-out;
            background-color: var(--college-item-bg);
        }

        .tansik-college-item:hover {
            transform: translateX(-5px);
        }

        .tansik-college-name {
            font-weight: bold;
        }

        .tansik-college-score {
            margin-right: 10px;
        }

        .tansik-no-colleges {
            color: #777;
            font-style: italic;
            padding: 20px;
            animation: tansik-fadeIn 0.5s;
        }

        .tansik-highlight {
            border-left: 4px solid var(--college-color);
        }

        .tansik-exact-match {
            background-color: rgba(155, 89, 182, 0.2);
            border-left: 4px solid var(--exact-match-color);
            animation: tansik-pulse 2s infinite;
        }

        /* Animations */
        @keyframes tansik-fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes tansik-pulse {
            0% { box-shadow: 0 0 0 0 rgba(155, 89, 182, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(155, 89, 182, 0); }
            100% { box-shadow: 0 0 0 0 rgba(155, 89, 182, 0); }
        }

        @keyframes tansik-shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        @keyframes tansik-modeSwitch {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            .tansik-form-wrapper {
                padding: 20px;
            }
            .tansik-input {
                font-size: 16px;
                padding: 12px;
            }
            .tansik-calculator-container h2 {
                font-size: 22px;
            }
        }

        /* ==================== 2. تنسيقات حاسبة الجامعات الأهلية ==================== */
        body.tansik-university-mode {
            background: linear-gradient(135deg, #0f172a, #1e293b) !important;
            color: #e2e8f0 !important;
            transition: all 0.5s ease;
        }

        .uni-card {
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .uni-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            border-color: rgba(34, 211, 238, 0.3);
        }

        .uni-calculator {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .uni-input-field {
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            border-radius: 8px;
        }

        .uni-input-field:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
        }

        .uni-result-highlight {
            animation: uni-pulse 2s infinite;
        }

        @keyframes uni-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .uni-college-card {
            transition: transform 0.3s ease, box-shadow 0.1s ease;
        }

        .uni-college-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

        window.showUniversityCalculator = function() {
            document.getElementById('main-calculator-view').style.display = 'none';
            document.getElementById('university-view').style.display = 'block';
            document.body.className = 'tansik-university-mode';
            window.scrollTo(0, 0);

        window.showMainCalculator = function() {
            document.getElementById('university-view').style.display = 'none';

            document.body.className = `tansik-${tansikCurrentMode}-mode tansik-page`;
            window.scrollTo(0, 0);
        };
    </script>

        let tansikCurrentMode = 'boys';
        const tansikCollegesList = document.getElementById('tansik-colleges-list');
        const tansikCollegeSearch = document.getElementById('tansik-college-search');
        const tansikSchoolGradeInput = document.getElementById('tansik-school-grade');
        const tansikAptitudeGradeInput = document.getElementById('tansik-aptitude-grade');
        const tansikResultInput = document.getElementById('tansik-result');
        let tansikCurrentDisplayedColleges = [];

        // تهيئة الصفحة عند التحميل
        document.addEventListener('DOMContentLoaded', function() {
          document.querySelector('.boys-btn').classList.add('active');
          document.querySelector('.girls-btn').classList.remove('active');
          showAllTansikColleges();
          
          tansikSchoolGradeInput.addEventListener('input', tansikCalculate);
          tansikAptitudeGradeInput.addEventListener('input', tansikCalculate);
          
          tansikCollegeSearch.addEventListener('input', tansikFilterColleges);
          
          // إضافة مستمعين لحذف القيم
          tansikSchoolGradeInput.addEventListener('change', function() {
            if(this.value === '') {
              showAllTansikColleges();
              tansikResultInput.value = '';
              document.querySelector('.tansik-result-percentage').textContent = '';
            }
          });
          
          tansikAptitudeGradeInput.addEventListener('change', function() {
            if(this.value === '') {
              showAllTansikColleges();
              tansikResultInput.value = '';
              document.querySelector('.tansik-result-percentage').textContent = '';
            }
          });

          // تفعيل النقر على البانر للانتقال لصفحة الجامعات الأهلية والخاصة المدمجة
          const banner = document.getElementById('tansik-university-banner');
          if (banner) {
            banner.addEventListener('click', function() {
              banner.style.transform = 'scale(0.98)';
              banner.style.opacity = '0.8';
              banner.style.transition = 'all 0.3s ease';
              
              setTimeout(() => {
                window.showUniversityCalculator();
              }, 300);
            });
          }
        });

        function tansikSwitchMode(mode) {
          if (tansikCurrentMode === mode) return;
          
          // إظهار مؤشر تحميل
          tansikCollegesList.innerHTML = '<div style="padding: 20px; text-align: center;">جاري التحميل...</div>';
          
          tansikCurrentMode = mode;
          
          // تأثيرات الانتقال
          document.body.classList.add('tansik-mode-switch-animation');
          setTimeout(() => {
            document.body.classList.remove('tansik-mode-switch-animation');
          }, 500);
          
          // تغيير النمط حسب الجنس
          document.body.classList.remove('tansik-boys-mode', 'tansik-girls-mode');
          document.body.classList.add(`tansik-${mode}-mode`);
          document.body.classList.add('tansik-page');
          
          // تحديث الأزرار النشطة
          document.querySelector('.boys-btn').classList.remove('active');
          document.querySelector('.girls-btn').classList.remove('active');
          document.querySelector(`.${mode}-btn`).classList.add('active');
          
          // تغيير النص حسب الجنس
          document.querySelector('.tansik-calculator-container h2').textContent = 
            mode === 'girls' ? 'حاسبة التنسيق للبنات 2025' : 'حاسبة التنسيق للبنين 2025';
          
          // إعادة تعيين جميع الحقول والنتائج
          tansikSchoolGradeInput.value = '';
          tansikAptitudeGradeInput.value = '';
          tansikResultInput.value = '';
          document.querySelector('.tansik-result-percentage').textContent = '';
          tansikCollegeSearch.value = '';
          
          // إعادة تعيين موضع التمرير وإعادة تحميل الكليات
          tansikCollegesList.scrollTop = 0;
          tansikCollegesList.style.opacity = '0';
          
          setTimeout(() => {
            showAllTansikColleges();
            tansikCollegesList.style.opacity = '1';
          }, 300);
        }

        function tansikConvertToEnglishNumbers(arabicNum) {
          if (!arabicNum) return '';
          return arabicNum.replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d));
        }

        function tansikCalculate() {
          let s = tansikConvertToEnglishNumbers(tansikSchoolGradeInput.value.trim());
          let q = tansikConvertToEnglishNumbers(tansikAptitudeGradeInput.value.trim());
          s = parseFloat(s);
          q = parseFloat(q);

          if ((s > 100 || q > 100 || s < 0 || q < 0)) {
            document.getElementById('tansik-error-message').style.display = 'block';
            document.getElementById('tansik-error-message').textContent = s > 100 || q > 100 ? "الدرجة لا يمكن أن تتجاوز 100" : "الدرجة لا يمكن أن تكون أقل من الصفر";
            tansikResultInput.value = '';
            document.querySelector('.tansik-result-percentage').textContent = '';
            return;
          } else {
            document.getElementById('tansik-error-message').style.display = 'none';
          }

          if (!isNaN(s) && !isNaN(q) && s >= 0 && q >= 0) {
            const final = ((s + q) / 2) * 4.1;
            const percentage = ((final / 410) * 100).toFixed(2);
            const resultText = final === 410 ? "410" : final.toFixed(6);
            tansikResultInput.value = resultText;
            
            // تغيير رسالة التشجيع حسب الجنس
            const encouragement = tansikCurrentMode === 'boys' ? '🎉 عاش يا بطل' : '👑';
            document.querySelector('.tansik-result-percentage').textContent = `${percentage}%` + (percentage > 98 ? ` - ${encouragement}` : '');
            
            tansikShowAvailableColleges(final);
          } else {
            tansikResultInput.value = '';
            document.querySelector('.tansik-result-percentage').textContent = '';
            showAllTansikColleges();
          }
        }

        function tansikShowAvailableColleges(score) {
          const data = tansikCollegesData[tansikCurrentMode];
          tansikCurrentDisplayedColleges = data.filter(college => college.score <= score + 0.000001)
            .sort((a, b) => b.score - a.score);

          if (tansikCurrentDisplayedColleges.length === 0) {
            tansikCollegesList.innerHTML = '<div class="tansik-no-colleges">لا توجد كليات متاحة لهذه الدرجة</div>';
            return;
          }

          tansikRenderColleges(tansikCurrentDisplayedColleges);
        }

        function showAllTansikColleges() {
          const data = tansikCollegesData[tansikCurrentMode];
          tansikCurrentDisplayedColleges = [...data].sort((a, b) => b.score - a.score);
          tansikRenderColleges(tansikCurrentDisplayedColleges);
        }

        function tansikFilterColleges() {
          const searchTerm = tansikCollegeSearch.value.trim().toLowerCase();
          const currentScore = tansikResultInput.value ? parseFloat(tansikResultInput.value) : null;
          
          if (searchTerm === '') {
            if (tansikResultInput.value === '') {
              showAllTansikColleges();
            } else {
              tansikCalculate();
            }
            return;
          }
          
          // البحث في جميع الكليات وليس فقط المعروضة حالياً
          const allColleges = tansikCollegesData[tansikCurrentMode];
          const filtered = allColleges.filter(college => 
              college.name.toLowerCase().includes(searchTerm))
              .sort((a, b) => b.score - a.score);
          
          if (filtered.length === 0) {
              tansikCollegesList.innerHTML = '<div class="tansik-no-colleges">لا توجد كليات تطابق البحث</div>';
          } else {
              let collegesHTML = '';
              filtered.forEach((college, index) => {
                  const isExactMatch = currentScore !== null && 
                                      Math.abs(college.score - currentScore) <= 0.000001;
                  const isAvailable = currentScore === null || college.score <= currentScore + 0.000001;
                  
                  collegesHTML += `
                  <div class="tansik-college-item ${isExactMatch ? 'tansik-exact-match' : 
                      isAvailable ? 'tansik-highlight' : 'tansik-not-available'}" 
                      style="animation-delay: ${index * 0.05}s">
                      <span class="tansik-college-name">${college.name}</span>
                      <span class="tansik-college-score">${college.score.toFixed(6)}</span>
                      ${isExactMatch ? '<span style="color: var(--exact-match-color);">(تساوي درجتك بالضبط)</span>' : ''}
                      ${!isAvailable ? '<span class="tansik-not-available-message">(درجتك لا تكفي لدخول هذه الكلية)</span>' : ''}
                  </div>`;
              });
              tansikCollegesList.innerHTML = collegesHTML;
          }
        }

        function tansikRenderColleges(colleges) {
          let collegesHTML = '';
          const currentScore = tansikResultInput.value ? parseFloat(tansikResultInput.value) : null;
          
          colleges.forEach((college, index) => {
              const isExactMatch = currentScore !== null && 
                                  Math.abs(college.score - currentScore) <= 0.000001;
              const isAvailable = currentScore === null || college.score <= currentScore + 0.000001;
              
              collegesHTML += `
              <div class="tansik-college-item ${isExactMatch ? 'tansik-exact-match' : 
                  isAvailable ? 'tansik-highlight' : 'tansik-not-available'}" 
                  style="animation-delay: ${index * 0.05}s">
                  <span class="tansik-college-name">${college.name}</span>
                  <span class="tansik-college-score">${college.score.toFixed(6)}</span>
                  ${isExactMatch ? '<span style="color: var(--exact-match-color);">(تساوي درجتك بالضبط)</span>' : ''}
                  ${!isAvailable ? '<span class="tansik-not-available-message">(درجتك لا تكفي لدخول هذه الكلية)</span>' : ''}
              </div>`;
          });
          tansikCollegesList.innerHTML = collegesHTML;
        }

        // تحديث ألوان البانر عند تغيير الوضع
        function updateBannerColors() {
            if (tansikCurrentMode === 'boys') {
                document.documentElement.style.setProperty('--banner-primary', '#0077b6');
                document.documentElement.style.setProperty('--banner-secondary', '#004a7c');
                document.documentElement.style.setProperty('--instagram-color', '#E1306C');
            } else {
                document.documentElement.style.setProperty('--banner-primary', '#ff69b4');
                document.documentElement.style.setProperty('--banner-secondary', '#d44d8c');
                document.documentElement.style.setProperty('--instagram-color', '#C13584');
            }
        }

        // تعديل دالة تغيير الوضع الأصلية
        const originalSwitchMode = tansikSwitchMode;
        tansikSwitchMode = function(mode) {
            originalSwitchMode(mode);
            updateBannerColors();
        };

        // تحديث الألوان عند التحميل الأولي
        document.addEventListener('DOMContentLoaded', updateBannerColors);
    </script>

    <!-- كود الـ React الخاص بحاسبة الجامعات الأهلية -->
    <script type="text/babel">
        const universitiesData = [
            {
                name: "جامعة المنصورة الأهلية",
                officialSite: "https://www.mansnu.edu.eg",
                colleges: [
                    { name: "الطب البشري", minScore: 99.5, fees: "150,000 جنيه" },
                    { name: "طب الأسنان", minScore: 96, fees: "130,000 جنيه" },
                    { name: "الصيدلة", minScore: 94.80, fees: "100,000 جنيه" },
                    { name: "الهندسة", minScore: 94, fees: "80,000 جنيه" },
                ],
            },
            {
                name: "المنصورة الجديدة",
                officialSite: "https://www.newmans.edu.eg",
                colleges: [
                    { name: "الطب البشري", minScore: 99.51, fees: "105,000 جنيه" },
                    { name: "طب الأسنان", minScore: 98.78, fees: "97,000 جنيه" },
                    { name: "الصيدلة", minScore: 82.11, fees: "85,000 جنيه" },
                    { name: "الهندسة", minScore: 70, fees: "69,000 جنيه" },
                    { name: "هندسة الحاسب", minScore: 70, fees: "69,000 جنيه" },
                    { name: "حاسبات ومعلومات", minScore: 70, fees: "69,000 جنيه" },
                    { name: "علوم", minScore: 58, fees: "48,000 جنيه" },
                    { name: "تمريض", minScore: 58, fees: "31,000 جنيه" },
                ],
            },
            {
                name: "جامعة النيل",
                officialSite: "https://www.nileu.edu.eg",
                colleges: [
                    { name: "الهندسة", minScore: 70, fees: "93,000 جنيه" },
                    { name: "هندسة حيوية", minScore: 70, fees: "93,000 جنيه" },
                    { name: "حاسبات ومعلومات", minScore: 65, fees: "89,000 جنيه" },
                    { name: "بيزنس", minScore: 58, fees: "71,000 جنيه" },
                    { name: "تكنولوجيا بيولوجية", minScore: 58, fees: "80,000 جنيه" },
                ],
            },
        ];

        function Calculator() {
            const [aptitudeScore, setAptitudeScore] = React.useState("");
            const [schoolScore, setSchoolScore] = React.useState("");
            const [result, setResult] = React.useState(null);

            const isArabic = document.documentElement.lang === 'ar' || navigator.language.startsWith('ar');
            const decimalPoint = isArabic ? '٫' : '.';

            const arabicToEnglish = (str) => {
                const arabicNumbers = '٠١٢٣٤٥٦٧٨٩٫';
                const englishNumbers = '0123456789.';
                return str.split('').map(char => arabicNumbers.includes(char) ? englishNumbers[arabicNumbers.indexOf(char)] : char).join('');
            };

            const handleInput = (e, setValue) => {
                const value = arabicToEnglish(e.target.value);
                const validInput = value.match(/^\d*\.?\d*$/);
                if (!validInput) return; // Ignore invalid input silently
                const numValue = parseFloat(value);
                if (isNaN(numValue) && value !== '' && value !== '.') {
                    return; // Ignore non-numeric input silently
                }
                if (value === '' || value === '.') {
                    setValue(value);
                    return;
                }
                if (numValue <= 100) {
                    setValue(value);
                }
            };

            const calculatePercentage = () => {
                if (!aptitudeScore || !schoolScore) return;
                const aptitude = parseFloat(aptitudeScore) || 0;
                const school = parseFloat(schoolScore) || 0;
                const average = (aptitude + school) / 2;
                const totalScore = average * 4.1;
                const percentage = (totalScore / 410) * 100;
                setResult({ total: totalScore.toFixed(2), percentage: percentage.toFixed(2) });
            };

            const handleReset = () => {
                setAptitudeScore("");
                setSchoolScore("");
                setResult(null);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') {
                    calculatePercentage();
                }
            };

            const getEligibleColleges = () => {
                if (!result?.percentage) return [];
                return universitiesData.flatMap(university =>
                    university.colleges
                        .filter(college => college.minScore <= parseFloat(result.percentage))
                        .map(college => ({ ...college, university: university.name }))
                ).sort((a, b) => b.minScore - a.minScore); // ترتيب تنازلي حسب minScore
            };

            const eligibleColleges = getEligibleColleges();

            return React.createElement('div', { className: 'uni-calculator p-6 mb-8 rounded-lg shadow-lg' },
                React.createElement('div', { className: 'flex items-center justify-between mb-4' },
                    React.createElement('div', { style: { flex: 1, display: 'flex', justifyContent: 'center' } },
                        React.createElement('i', {
                            className: 'fas fa-calculator',
                            style: { fontSize: '2.2rem', color: '#06b6d4', background: '#fff', borderRadius: '50%', padding: '12px', boxShadow: '0 2px 12px #06b6d455' }
                        })
                    ),
                    React.createElement('button', {
                        onClick: handleReset,
                        title: 'إعادة تعيين',
                        className: 'reset-btn bg-cyan-500 hover:bg-cyan-600 text-white rounded-full p-2 flex items-center justify-center',
                        style: { minWidth: 40, minHeight: 40, marginRight: 'auto' }
                    },
                        React.createElement('i', { className: 'fas fa-redo', style: { fontSize: '1.2rem' } })
                    )
                ),
                React.createElement('div', { className: 'grid grid-cols-1 gap-4' },
                    React.createElement('div', null,
                        React.createElement('label', { className: 'block text-right font-semibold mb-2 text-sm text-cyan-400' }, 'درجة القدرات (من 100)'),
                        React.createElement('input', {
                            type: 'text',
                            inputMode: 'decimal',
                            placeholder: 'أدخل درجة القدرات...',
                            className: 'uni-input-field p-3 rounded-lg bg-gray-800 text-white border border-gray-600 focus:outline-none w-full text-right',
                            value: aptitudeScore,
                            onChange: (e) => handleInput(e, setAptitudeScore),
                            onKeyPress: handleKeyPress
                        })
                    ),
                    React.createElement('div', null,
                        React.createElement('label', { className: 'block text-right font-semibold mb-2 text-sm text-cyan-400' }, 'درجة المدرسة (من 100)'),
                        React.createElement('input', {
                            type: 'text',
                            inputMode: 'decimal',
                            placeholder: 'أدخل درجة المدرسة...',
                            className: 'uni-input-field p-3 rounded-lg bg-gray-800 text-white border border-gray-600 focus:outline-none w-full text-right',
                            value: schoolScore,
                            onChange: (e) => handleInput(e, setSchoolScore),
                            onKeyPress: handleKeyPress
                        })
                    )
                ),
                React.createElement('button', {
                    onClick: calculatePercentage,
                    className: 'mt-6 w-full bg-cyan-500 text-white p-3 rounded-lg hover:bg-cyan-600 transition duration-300 font-semibold flex items-center justify-center',
                    disabled: !aptitudeScore || !schoolScore
                }, 'احسب النتيجة'),
                result && React.createElement('div', { className: 'mt-6 p-4 bg-gray-900 rounded-lg uni-result-highlight border border-cyan-500/30' },
                    React.createElement('div', { className: 'grid grid-cols-1 gap-2 mb-2 text-right' },
                        React.createElement('div', { className: 'text-lg text-white' },
                            React.createElement('span', { className: 'font-bold' }, 'الدرجة الإجمالية المعادلة:'),
                            ' ',
                            React.createElement('span', { className: 'text-cyan-400 font-bold' }, result.total, ' / 410')
                        ),
                        React.createElement('div', { className: 'text-lg text-white' },
                            React.createElement('span', { className: 'font-bold' }, 'النسبة المئوية:'),
                            ' ',
                            React.createElement('span', { className: 'text-cyan-400 font-bold' }, result.percentage, '%')
                        )
                    ),
                    React.createElement('p', { className: 'mt-4 text-right text-base font-semibold border-t border-gray-800 pt-2 text-cyan-400' }, '🎓 الكليات المتاحة لك بناءً على درجتك:'),
                    React.createElement('div', { className: 'result-colleges flex flex-col space-y-2 mt-2 text-right' },
                        eligibleColleges.length > 0 ? (
                            eligibleColleges.map((college, index) =>
                                React.createElement('div', { key: index, className: 'bg-gray-800 p-3 rounded-lg text-base border border-gray-700 hover:border-cyan-500/50 transition duration-200 text-white' },
                                    React.createElement('div', { className: 'font-semibold text-cyan-400' }, college.name),
                                    React.createElement('div', { className: 'text-gray-300 text-sm mt-1' }, 'الجامعة: ', college.university),
                                    React.createElement('div', { className: 'text-gray-400 text-xs' }, 'الحد الأدنى للقبول: ', college.minScore, '%'),
                                    college.fees && React.createElement('div', { className: 'text-emerald-400 text-xs font-semibold' }, 'المصروفات السنوية: ', college.fees)
                                )
                            )
                        ) : (
                            React.createElement('div', { className: 'text-red-400 text-base' }, 'لا توجد كليات متاحة بناءً على درجتك الحالية')
                        )
                    )
                )
            );
        }

        function UniversityCard({ university }) {
            const [isExpanded, setIsExpanded] = React.useState(false);
            const [scrollHandled, setScrollHandled] = React.useState(false);

            const handleScroll = (e) => {
                if (window.innerWidth <= 640 && !scrollHandled) {
                    const { scrollTop, scrollHeight, clientHeight } = e.target;
                    if (scrollTop + clientHeight >= scrollHeight - 5) {
                        e.target.style.overflowY = 'hidden';
                        window.scrollBy(0, 1);
                        setScrollHandled(true);
                    }
                }
            };

            const remainingColleges = university.colleges.length - 2;

            return React.createElement('div', { className: 'uni-card p-6 rounded-lg shadow-md mb-6 text-right text-white ' + (isExpanded ? 'expanded' : '') },
                React.createElement('h3', {
                    className: 'text-xl font-bold text-cyan-400 mb-4 cursor-pointer flex justify-between items-center',
                    onClick: () => { setIsExpanded(!isExpanded); setScrollHandled(false); }
                },
                    React.createElement('span', null, isExpanded ? '▲' : '▼'),
                    React.createElement('span', null, university.name)
                ),
                !isExpanded ? (
                    React.createElement('ul', { className: 'space-y-2' },
                        university.colleges.slice(0, 2).map((college, index) =>
                            React.createElement('li', { key: index, className: 'text-gray-300 uni-college-card p-3 rounded bg-gray-800/40 border border-gray-800' },
                                React.createElement('span', { className: 'font-semibold' }, college.name),
                                ' - حد أدنى: ',
                                React.createElement('span', { className: 'text-cyan-400 font-bold' }, college.minScore, '%')
                            )
                        ),
                        university.colleges.length > 2 && React.createElement('li', {
                            className: 'text-cyan-400 cursor-pointer text-sm font-semibold hover:underline mt-2 inline-block',
                            onClick: () => setIsExpanded(true)
                        }, '+ عرض المزيد... (باقي ', remainingColleges, ' كليات)')
                    )
                ) : (
                    React.createElement('div', { className: 'space-y-4', onScroll: handleScroll },
                        React.createElement('p', { className: 'text-gray-300' },
                            React.createElement('span', { className: 'font-bold' }, 'الموقع الرسمي:'),
                            ' ',
                            React.createElement('a', {
                                href: university.officialSite,
                                target: '_blank',
                                rel: 'noopener noreferrer',
                                className: 'text-cyan-400 hover:underline'
                            }, 'الانتقال إلى الموقع الرسمي ↗')
                        ),
                        React.createElement('ul', { className: 'space-y-2' },
                            university.colleges.map((college, index) =>
                                React.createElement('li', { key: index, className: 'uni-college-card p-3 rounded bg-gray-800 text-gray-200 border border-gray-700' },
                                    React.createElement('div', { className: 'font-semibold text-cyan-400' }, college.name),
                                    React.createElement('div', { className: 'text-sm mt-1' }, 'حد أدنى للقبول: ', college.minScore, '%'),
                                    college.fees ? React.createElement('div', { className: 'text-emerald-400 text-sm font-semibold' }, 'المصروفات سنويًا: ', college.fees) : React.createElement('div', { className: 'text-gray-400 text-xs' }, 'المصروفات: غير محددة')
                                )
                            )
                        ),
                        React.createElement('button', {
                            onClick: () => setIsExpanded(false),
                            className: 'mt-4 w-full bg-gray-700 text-white p-2 rounded-lg hover:bg-gray-600 transition duration-300 font-semibold'
                        }, 'عرض أقل'),
                        React.createElement('p', { className: 'text-gray-400 text-xs mt-2 italic' }, '* قد تختلف المصروفات الرسمية للعام الدراسي الحالي، يرجى مراجعة إدارة الجامعة للتأكد.')
                    )
                )
            );
        }

        function App() {
            return React.createElement('div', { className: 'container mx-auto p-4 max-w-4xl' },
                React.createElement('div', { className: 'flex justify-between items-center mb-6 border-b border-gray-800 pb-4' },
                    React.createElement('a', {
                        href: '#',
                        onClick: (e) => {
                            e.preventDefault();
                            window.showMainCalculator();
                        },
                        className: 'bg-cyan-950/40 hover:bg-cyan-900/60 text-cyan-400 border border-cyan-500/30 px-4 py-2 rounded-lg text-sm font-semibold transition duration-300 flex items-center gap-2'
                    },
                        React.createElement('i', { className: 'fas fa-arrow-right' }),
                        'العودة للحاسبة الأساسية'
                    ),
                    React.createElement('div', { className: 'text-xs text-gray-400' }, 'نسخة تجريبية 1.0')
                ),
                React.createElement('header', { className: 'text-center mb-8' },
                    React.createElement('h1', { className: 'text-3xl font-bold text-cyan-400' }, 'حاسبة تنسيق الجامعات الأهلية 2024/2025'),
                    React.createElement('p', { className: 'text-gray-400 mt-2 text-sm' }, 'أدخل درجاتك واكتشف الكليات المتاحة لك بالجامعات الأهلية ومصروفاتها الدراسية')
                ),
                React.createElement(Calculator, null),
                React.createElement('h2', { className: 'text-2xl font-bold text-cyan-400 mb-4 text-right' }, '🏫 الجامعات الأهلية المتاحة:'),
                React.createElement('div', { className: 'grid grid-cols-1 gap-6' },
                    universitiesData.map((university, index) =>
                        React.createElement(UniversityCard, { key: index, university: university })
                    )
                ),
                React.createElement('footer', { className: 'text-center mt-12 text-gray-500 text-sm border-t border-gray-800 pt-6' },
                    React.createElement('p', null, 'تمت البيانات بالتواصل مع شؤون الطلاب بالجامعات - آخر تحديث: يونيو 2025'),
                    React.createElement('div', { className: 'mt-4 p-3 bg-cyan-950/20 rounded-lg border border-cyan-950 inline-block' },
                        React.createElement('p', { className: 'text-sm text-cyan-400 font-semibold' }, 'باقي الجامعات الأهلية سيتم إضافتها تباعاً!')
                    )
                )
            );
        }

        const rootElement = document.getElementById('university-root');
        if (rootElement) {
            ReactDOM.render(React.createElement(App, null), rootElement);
        } else {
            console.error('Root element not found');
        }
    </script>
